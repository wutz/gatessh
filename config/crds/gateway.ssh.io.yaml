apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: sshgatewayclasses.gateway.ssh.io
spec:
  group: gateway.ssh.io
  names:
    kind: SSHGatewayClass
    listKind: SSHGatewayClassList
    plural: sshgatewayclasses
    singular: sshgatewayclass
    shortNames:
    - sshgc
  scope: Cluster
  versions:
  - name: v1alpha1
    served: true
    storage: true
    subresources:
      status: {}
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            required: [controllerName]
            properties:
              controllerName:
                type: string
              description:
                type: string
              parametersRef:
                type: object
                properties:
                  group:
                    type: string
                  kind:
                    type: string
                  name:
                    type: string
                  namespace:
                    type: string
          status:
            type: object
            properties:
              conditions:
                type: array
                items:
                  type: object
                  properties:
                    type:
                      type: string
                    status:
                      type: string
                    observedGeneration:
                      type: integer
                      format: int64
                    lastTransitionTime:
                      type: string
                      format: date-time
                    reason:
                      type: string
                    message:
                      type: string
    additionalPrinterColumns:
    - name: Controller
      type: string
      jsonPath: .spec.controllerName
    - name: Accepted
      type: string
      jsonPath: .status.conditions[?(@.type=="Accepted")].status
    - name: Age
      type: date
      jsonPath: .metadata.creationTimestamp
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: sshgateways.gateway.ssh.io
spec:
  group: gateway.ssh.io
  names:
    kind: SSHGateway
    listKind: SSHGatewayList
    plural: sshgateways
    singular: sshgateway
    shortNames:
    - sshgw
  scope: Namespaced
  versions:
  - name: v1alpha1
    served: true
    storage: true
    subresources:
      status: {}
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            required: [gatewayClassName, listeners]
            properties:
              gatewayClassName:
                type: string
              listeners:
                type: array
                items:
                  type: object
                  required: [name, port, auth]
                  properties:
                    name:
                      type: string
                    port:
                      type: integer
                      format: int32
                      minimum: 1
                      maximum: 65535
                    protocol:
                      type: string
                      enum: [SSH]
                      default: SSH
                    hostKey:
                      type: object
                      properties:
                        name:
                          type: string
                        namespace:
                          type: string
                    auth:
                      type: object
                      required: [methods]
                      properties:
                        methods:
                          type: array
                          items:
                            type: string
                            enum: [Password, PublicKey, Keyboard]
                        maxRetries:
                          type: integer
                          format: int32
          status:
            type: object
            properties:
              conditions:
                type: array
                items:
                  type: object
                  properties:
                    type:
                      type: string
                    status:
                      type: string
                    observedGeneration:
                      type: integer
                      format: int64
                    lastTransitionTime:
                      type: string
                      format: date-time
                    reason:
                      type: string
                    message:
                      type: string
              listeners:
                type: array
                items:
                  type: object
                  properties:
                    name:
                      type: string
                    attachedRoutes:
                      type: integer
                      format: int32
                    conditions:
                      type: array
                      items:
                        type: object
                        properties:
                          type:
                            type: string
                          status:
                            type: string
                          observedGeneration:
                            type: integer
                            format: int64
                          lastTransitionTime:
                            type: string
                            format: date-time
                          reason:
                            type: string
                          message:
                            type: string
              addresses:
                type: array
                items:
                  type: object
                  properties:
                    type:
                      type: string
                    value:
                      type: string
    additionalPrinterColumns:
    - name: Class
      type: string
      jsonPath: .spec.gatewayClassName
    - name: Accepted
      type: string
      jsonPath: .status.conditions[?(@.type=="Accepted")].status
    - name: Programmed
      type: string
      jsonPath: .status.conditions[?(@.type=="Programmed")].status
    - name: Age
      type: date
      jsonPath: .metadata.creationTimestamp
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: sshroutes.gateway.ssh.io
spec:
  group: gateway.ssh.io
  names:
    kind: SSHRoute
    listKind: SSHRouteList
    plural: sshroutes
    singular: sshroute
    shortNames:
    - sshr
  scope: Namespaced
  versions:
  - name: v1alpha1
    served: true
    storage: true
    subresources:
      status: {}
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            required: [parentRefs, rules]
            properties:
              parentRefs:
                type: array
                items:
                  type: object
                  required: [name]
                  properties:
                    name:
                      type: string
                    namespace:
                      type: string
                    sectionName:
                      type: string
                    port:
                      type: integer
                      format: int32
              rules:
                type: array
                items:
                  type: object
                  properties:
                    matches:
                      type: array
                      items:
                        type: object
                        properties:
                          users:
                            type: array
                            items:
                              type: string
                          commands:
                            type: array
                            items:
                              type: object
                              required: [value]
                              properties:
                                type:
                                  type: string
                                  enum: [Exact, Prefix, Regex]
                                  default: Exact
                                value:
                                  type: string
                    backendRefs:
                      type: array
                      items:
                        type: object
                        required: [name]
                        properties:
                          name:
                            type: string
                          namespace:
                            type: string
                          port:
                            type: integer
                            format: int32
                          weight:
                            type: integer
                            format: int32
                    filters:
                      type: array
                      items:
                        type: object
                        required: [type]
                        properties:
                          type:
                            type: string
                            enum: [CommandTemplate, RecordSession]
                          commandTemplate:
                            type: object
                            properties:
                              allowedCommands:
                                type: array
                                items:
                                  type: string
                              deniedCommands:
                                type: array
                                items:
                                  type: string
                          recordSession:
                            type: object
                            properties:
                              enabled:
                                type: boolean
                              path:
                                type: string
          status:
            type: object
            properties:
              parents:
                type: array
                items:
                  type: object
                  properties:
                    parentRef:
                      type: object
                      properties:
                        name:
                          type: string
                        namespace:
                          type: string
                        sectionName:
                          type: string
                        port:
                          type: integer
                          format: int32
                    conditions:
                      type: array
                      items:
                        type: object
                        properties:
                          type:
                            type: string
                          status:
                            type: string
                          observedGeneration:
                            type: integer
                            format: int64
                          lastTransitionTime:
                            type: string
                            format: date-time
                          reason:
                            type: string
                          message:
                            type: string
    additionalPrinterColumns:
    - name: Accepted
      type: string
      jsonPath: .status.parents[0].conditions[?(@.type=="Accepted")].status
    - name: Age
      type: date
      jsonPath: .metadata.creationTimestamp
